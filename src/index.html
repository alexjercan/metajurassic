<!doctype html>
<html lang="en" class="page-fixed">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Metajurassic</title>
        <script
            async
            src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3959623404880860"
            crossorigin="anonymous"
        ></script>
        <link
            rel="icon"
            href="<%= htmlWebpackPlugin.options.basePath %>/favicon.svg"
        />
    </head>

    <body>
        <div id="header"></div>
        <main>
            <div class="game-container">
                <div class="top-bar">
                    <div class="stat-box" id="stat-box">Guesses Left: 25</div>
                    <div class="hint-box" id="hint-box">
                        <div class="hint-text" id="hint-text">
                            <strong>Hint:</strong><span>Cost 3 Guesses</span>
                        </div>
                    </div>
                </div>
                <div class="game-area">
                    <!-- AdSense ad unit
                    <div class="ad-container">
                    </div>
                    -->
                    <div class="arena-wrapper" id="arena-wrapper">
                        <div class="arena" id="arena">
                            <div class="tree" id="tree-container"></div>
                        </div>
                    </div>
                    <button
                        class="panel-pull"
                        id="open-panel"
                        aria-label="Open info panel"
                    >
                        ⟡
                    </button>
                    <div class="info-panel" id="info-panel">
                        <div
                            class="panel-card-container"
                            id="panel-card-container"
                        ></div>
                    </div>
                </div>
                <div class="bottom-bar">
                    <div class="input-wrapper">
                        <div
                            class="autocomplete-box"
                            id="autocomplete-box"
                        ></div>
                        <input
                            type="text"
                            class="player-input"
                            id="player-input"
                            placeholder="Enter a dinosaur..."
                            autocomplete="off"
                        />
                    </div>
                </div>
            </div>
        </main>
        <div class="modal-overlay" id="modal-overlay">
            <div class="modal" id="modal">
                <div class="modal-icon" id="modal-icon"></div>
                <h2 class="modal-title" id="modal-title"></h2>
                <p class="modal-message" id="modal-message"></p>
                <div class="modal-stats" id="modal-stats"></div>
                <div class="modal-actions">
                    <button class="modal-btn" id="modal-close-btn">OK</button>
                    <a
                        class="modal-btn modal-btn-practice"
                        href="<%= htmlWebpackPlugin.options.basePath %>practice"
                        >Practice</a
                    >
                    <button class="modal-btn" id="modal-share-btn">
                        <span>Share</span>
                        <img class="share-icon" alt="" />
                    </button>
                </div>
            </div>
        </div>
        <div id="footer"></div>
    </body>
</html>
