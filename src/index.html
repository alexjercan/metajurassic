<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Metajurassic</title>
    </head>

    <body>
        <header></header>
        <main>
            <div class="game-container">
                <div class="top-bar">
                    <div class="stat-box" id="stat-box">Guesses Left: 25</div>
                    <div class="hint-box" id="hint-box">
                        <div class="hint-text" id="hint-text">
                            <strong>Hint:</strong><span>Cost 3 Guesses</span>
                        </div>
                    </div>
                </div>
                <div class="game-area">
                    <div class="arena-wrapper" id="arena-wrapper">
                        <div class="arena" id="arena">
                            <div class="tree" id="tree-container"></div>
                        </div>
                    </div>
                    <button
                        class="panel-pull"
                        id="open-panel"
                        aria-label="Open info panel"
                    >
                        ⟡
                    </button>
                    <div class="info-panel" id="info-panel">
                        <div class="museum-card" id="species-card">
                            <div class="card-header">
                                <h2 class="card-title" id="card-title">Name</h2>
                            </div>
                            <div class="card-image-area" id="card-image-area">
                                [ Hologram Render ]
                            </div>
                            <div class="card-content">
                                <div class="card-stats">
                                    <strong>Translation:</strong>
                                    <span id="card-translation">...</span
                                    ><br /><strong>Clade:</strong>
                                    <span id="card-clade">...</span
                                    ><br /><strong>Era:</strong>
                                    <span id="card-era">...</span><br /><strong
                                        ><span id="card-size-label">Info</span
                                        >:</strong
                                    >
                                    <span id="card-size">...</span><br /><strong
                                        >Weight:</strong
                                    >
                                    <span id="card-weight">...</span>
                                </div>
                                <div class="card-fact">
                                    <strong>Museum Fact:</strong>
                                    <span id="card-fact">...</span>
                                </div>
                            </div>
                        </div>

                        <div
                            class="museum-card"
                            id="clade-card"
                            style="display: none"
                        >
                            <div class="card-header">
                                <h2 class="card-title" id="clade-title">
                                    Clade
                                </h2>
                            </div>
                            <div class="card-image-area" id="clade-image-area">
                                [ Hologram Render ]
                            </div>
                            <div class="card-content">
                                <div class="card-stats">
                                    <strong>Parent:</strong>
                                    <span id="clade-parent">—</span><br />
                                </div>
                                <div class="card-fact">
                                    <strong>Description:</strong>
                                    <span id="clade-description">...</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="bottom-bar">
                    <div class="input-wrapper">
                        <div
                            class="autocomplete-box"
                            id="autocomplete-box"
                        ></div>
                        <input
                            type="text"
                            class="player-input"
                            id="player-input"
                            placeholder="Enter a dinosaur..."
                            autocomplete="off"
                        />
                    </div>
                </div>
            </div>
        </main>
        <div class="modal-overlay" id="modal-overlay">
            <div class="modal" id="modal">
                <div class="modal-icon" id="modal-icon"></div>
                <h2 class="modal-title" id="modal-title"></h2>
                <p class="modal-message" id="modal-message"></p>
                <div class="modal-stats" id="modal-stats"></div>
                <div class="modal-actions">
                    <button class="modal-btn" id="modal-close-btn">OK</button>
                    <a
                        class="modal-btn modal-btn-practice"
                        href="<%= htmlWebpackPlugin.options.basePath %>practice"
                        >Practice</a
                    >
                </div>
            </div>
        </div>
        <footer>
            <a href="https://github.com/alexjercan/metajurassic" target="_blank"
                >GitHub</a
            >
            <a href="https://metazooa.com" target="_blank"
                >Inspired by Metazooa</a
            >
            <a href="<%= htmlWebpackPlugin.options.basePath %>faq">FAQ</a>
        </footer>
    </body>
</html>
