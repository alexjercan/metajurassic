<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaleoGrid: The Holo-Archive</title>
    <style>
        :root {
            --bg-dark: #0a0c10;
            --amber-glow: #e6a861;
            --amber-dim: rgba(230, 168, 97, 0.2);
            --glass-bg: rgba(20, 24, 32, 0.85);
            --glass-border: rgba(230, 168, 97, 0.4);
            --text-main: #e0e0e0;
            --victory-gold: #ffd700;
            --danger-red: #ff4a4a;
            --node-bg: #151820;
            --line-color: #555;
        }

        body {
            margin: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #toast-container {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .toast {
            background: var(--bg-dark);
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1rem;
            letter-spacing: 1px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.8);
            opacity: 1;
            transition: opacity 0.3s ease;
            animation: slideDown 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .toast.error {
            border: 1px solid var(--danger-red);
            color: var(--danger-red);
            box-shadow: 0 5px 20px rgba(255, 74, 74, 0.2);
        }

        .toast.warning {
            border: 1px solid var(--amber-glow);
            color: var(--amber-glow);
            box-shadow: 0 5px 20px rgba(230, 168, 97, 0.2);
        }

        @keyframes slideDown {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .top-bar {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            z-index: 40;
            pointer-events: none;
        }

        .stat-box {
            position: absolute;
            left: 20px;
            top: 0;
            pointer-events: auto;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--amber-glow);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
        }

        .center-console {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            pointer-events: auto;
        }

        .pool-text {
            color: #888;
            font-size: 0.9rem;
        }

        .hint-drive {
            background: linear-gradient(180deg, #1c2028 0%, #0d0f14 100%);
            border: 2px solid #3a4150;
            border-bottom: 4px solid var(--amber-glow);
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
            transition: 0.2s;
        }

        .hint-drive:hover {
            border-bottom: 4px solid #fff;
            transform: translateY(2px);
            filter: brightness(1.2);
        }

        .hint-drive.disabled {
            opacity: 0.5;
            pointer-events: none;
            border-bottom: 4px solid #444;
        }

        .hint-text {
            display: flex;
            flex-direction: column;
            font-size: 0.75rem;
            color: #8a93a5;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .hint-text strong {
            color: var(--amber-glow);
            font-size: 1rem;
        }

        .main-layout {
            flex-grow: 1;
            display: flex;
            position: relative;
            overflow: hidden;
            width: 100%;
        }

        .arena-wrapper {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            transition: margin-right 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .arena-wrapper.panel-open {
            margin-right: 380px;
        }

        .arena {
            flex-grow: 1;
            overflow: auto;
            padding-top: 120px;
            padding-bottom: 50px;
        }

        .tree {
            min-width: max-content;
            display: flex;
            justify-content: center;
            padding: 0 50px;
        }

        .tree ul {
            padding-top: 20px;
            position: relative;
            transition: all 0.5s;
            display: flex;
            justify-content: center;
            padding-left: 0;
        }

        .tree li {
            float: left;
            text-align: center;
            list-style-type: none;
            position: relative;
            padding: 20px 15px 0 15px;
            transition: all 0.5s;
        }

        .tree li::before,
        .tree li::after {
            content: '';
            position: absolute;
            top: 0;
            right: 50%;
            border-top: 2px solid var(--line-color);
            width: 50%;
            height: 20px;
        }

        .tree li::after {
            right: auto;
            left: 50%;
            border-left: 2px solid var(--line-color);
        }

        .tree li:only-child::after,
        .tree li:only-child::before {
            display: none;
        }

        .tree li:only-child {
            padding-top: 0;
        }

        .tree li:first-child::before,
        .tree li:last-child::after {
            border: 0 none;
        }

        .tree li:last-child::before {
            border-right: 2px solid var(--line-color);
            border-radius: 0 5px 0 0;
        }

        .tree li:first-child::after {
            border-radius: 5px 0 0 0;
        }

        .tree ul ul::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            border-left: 2px solid var(--line-color);
            width: 0;
            height: 20px;
        }

        .node-box {
            display: inline-block;
            padding: 12px 24px;
            border-radius: 8px;
            background: var(--node-bg);
            border: 2px solid var(--line-color);
            font-weight: bold;
            font-size: 1rem;
            position: relative;
            z-index: 2;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s ease;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .node-box:hover {
            filter: brightness(1.3);
            transform: scale(1.05);
        }

        @keyframes popIn {
            0% {
                transform: scale(0.5) translateY(-20px);
                opacity: 0;
            }

            100% {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
        }

        .node-root {
            border-color: #888;
            color: #ccc;
            font-size: 1.2rem;
            background: #222;
        }

        .node-lcc {
            border-color: var(--amber-glow);
            color: var(--amber-glow);
            box-shadow: 0 0 15px rgba(230, 168, 97, 0.2);
        }

        .node-guess {
            border-color: #5b7199;
            color: #a1bced;
        }

        .node-mystery {
            border: 2px dashed var(--danger-red);
            color: var(--danger-red);
            background: rgba(255, 74, 74, 0.1);
            font-size: 1.2rem;
            animation: pulseMystery 2s infinite alternate;
        }

        .node-winner {
            border-color: var(--victory-gold);
            background: var(--victory-gold);
            color: #000;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.6);
            transform: scale(1.1);
            z-index: 10;
        }

        @keyframes pulseMystery {
            from {
                box-shadow: 0 0 5px rgba(255, 74, 74, 0.2);
            }

            to {
                box-shadow: 0 0 20px rgba(255, 74, 74, 0.6);
            }
        }

        .info-panel {
            position: absolute;
            top: 0;
            bottom: 0;
            right: 0;
            width: 380px;
            border-left: 1px solid var(--glass-border);
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: linear-gradient(90deg, rgba(10, 12, 16, 0.9) 0%, rgba(20, 24, 32, 1) 100%);
            backdrop-filter: blur(10px);
            transform: translateX(105%);
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            z-index: 50;
        }

        .info-panel.active {
            transform: translateX(0);
            box-shadow: -10px 0 30px rgba(0, 0, 0, 0.8);
        }

        .close-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #888;
            cursor: pointer;
            font-size: 1.5rem;
            transition: 0.2s;
        }

        .close-panel:hover {
            color: #fff;
            transform: scale(1.1);
        }

        .museum-card {
            background: var(--bg-dark);
            border: 1px solid var(--amber-glow);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            margin-top: 40px;
        }

        .card-image-area {
            height: 180px;
            background: #1a1f29;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid var(--amber-glow);
            color: var(--amber-glow);
            overflow: hidden;
            padding: 10px;
        }

        .card-image-area img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .card-content {
            padding: 20px;
        }

        .card-title {
            font-size: 1.8rem;
            color: var(--amber-glow);
            margin: 0 0 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }

        .card-stats {
            font-size: 0.9rem;
            color: #aaa;
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .controls {
            flex-shrink: 0;
            padding: 25px;
            background: #080a0d;
            border-top: 1px solid #222;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 20;
            box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.8);
        }

        .input-wrapper {
            position: relative;
            width: 100%;
            max-width: 450px;
        }

        .search-bar {
            width: 100%;
            box-sizing: border-box;
            background: var(--glass-bg);
            border: 1px solid var(--amber-glow);
            padding: 15px 25px;
            border-radius: 30px;
            color: white;
            font-size: 1.2rem;
            outline: none;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
            transition: 0.3s;
        }

        .search-bar:focus {
            box-shadow: 0 0 20px rgba(230, 168, 97, 0.4);
        }

        .autocomplete-box {
            position: absolute;
            bottom: 100%;
            left: 0;
            right: 0;
            margin-bottom: 15px;
            background: rgba(20, 24, 32, 0.95);
            border: 1px solid var(--amber-glow);
            border-radius: 12px;
            overflow: hidden;
            max-height: 250px;
            overflow-y: auto;
            display: none;
            box-shadow: 0 -10px 25px rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 60;
        }

        .autocomplete-item {
            padding: 15px 20px;
            color: #ccc;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.2s;
        }

        .autocomplete-item:last-child {
            border-bottom: none;
        }

        .autocomplete-item:hover {
            background: rgba(230, 168, 97, 0.2);
            color: var(--amber-glow);
            padding-left: 30px;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        .overlay h1 {
            font-size: 4rem;
            margin: 0;
            text-align: center;
        }

        .victory h1 {
            color: var(--victory-gold);
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .defeat h1 {
            color: var(--danger-red);
        }

        .overlay p {
            font-size: 1.5rem;
            color: #fff;
            margin-bottom: 30px;
        }

        .btn-container {
            display: flex;
            gap: 20px;
        }

        .btn {
            padding: 12px 25px;
            font-size: 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            pointer-events: auto;
        }

        .btn-primary {
            background: var(--amber-glow);
            color: var(--bg-dark);
            border: none;
        }

        .btn-primary:hover {
            background: #fff;
            box-shadow: 0 0 15px var(--amber-glow);
        }

        .btn-secondary {
            background: transparent;
            color: #fff;
            border: 2px solid #fff;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        #floating-replay {
            position: absolute;
            bottom: 30px;
            left: 30px;
            z-index: 50;
        }
    </style>
</head>

<body>
    <div id="toast-container"></div>
    <div class="top-bar">
        <div class="stat-box" id="guess-counter">Guesses Left: 25</div>
        <div class="center-console">
            <div class="pool-text">Holo-Archive Engine Active</div>
            <div class="hint-drive" onclick="useHint()" id="hint-btn">
                <div class="hint-text"><span>Decrypt Module</span><strong>Cost: 3 Guesses</strong></div>
            </div>
        </div>
    </div>
    <div class="main-layout">
        <div class="arena-wrapper" id="arena-wrapper">
            <div class="arena" id="arena">
                <div class="tree" id="tree-container"></div>
            </div>
        </div>
        <div class="info-panel" id="info-panel">
            <div class="close-panel" onclick="closePanel()">✖</div>
            <div class="museum-card">
                <div class="card-image-area" id="card-image-area">[ Hologram Render ]</div>
                <div class="card-content">
                    <h2 class="card-title" id="card-title">Name</h2>
                    <div class="card-stats"><strong>Translation:</strong> <span
                            id="card-trans">...</span><br><strong>Era:</strong> <span
                            id="card-era">...</span><br><strong><span id="card-size-label">Info</span>:</strong> <span
                            id="card-size">...</span></div>
                    <div style="font-size: 0.95rem; color: #ddd; margin-top: 10px;"><strong>Museum Fact:</strong> <span
                            id="card-fact">...</span></div>
                </div>
            </div>
        </div>
    </div>
    <div class="controls">
        <div class="input-wrapper">
            <div class="autocomplete-box" id="autocomplete-box"></div><input type="text" class="search-bar"
                id="player-input" placeholder="Enter a dinosaur..." autocomplete="off">
        </div>
    </div><button class="btn btn-primary" id="floating-replay" style="display:none;" onclick="initGame()">Start New
        Archive</button>
    <div class="overlay victory" id="victory-screen">
        <h1>SPECIMEN RECOVERED</h1>
        <p>You found <span class="winner-name"></span> with <span id="win-guesses"></span> guesses remaining!</p>
        <div class="btn-container"><button class="btn btn-secondary" onclick="admireTree()">Admire My
                Tree</button><button class="btn btn-primary" onclick="initGame()">Play Again</button></div>
    </div>
    <div class="overlay defeat" id="defeat-screen">
        <h1>ARCHIVE LOCKED</h1>
        <p>Out of guesses. The answer was <span class="winner-name"></span>.</p>
        <div class="btn-container"><button class="btn btn-secondary" onclick="admireTree()">View My Tree</button><button
                class="btn btn-primary" onclick="initGame()">Play Again</button></div>
    </div>
    <script src="data.js"></script>
    <script>
        let answer, answerLin, guessedLineages, revealedHints, guessesLeft, highestDepthAchieved, gameOver;
        const input = document.getElementById('player-input'), autocompleteBox = document.getElementById('autocomplete-box'), treeContainer = document.getElementById('tree-container'), counter = document.getElementById('guess-counter'), panel = document.getElementById('info-panel'), hintBtn = document.getElementById('hint-btn'), arenaWrapper = document.getElementById('arena-wrapper');
        function showToast(m, t = "error") {const c = document.getElementById('toast-container'), s = document.createElement('div'); s.className = toast ${t}; s.innerText = m; c.appendChild(s); setTimeout(() => {s.style.opacity = '0'; setTimeout(() => s.remove(), 300);}, 2500);}
        function initGame() {answer = dinoNames[Math.floor(Math.random() * dinoNames.length)]; answerLin = db[answer]; guessedLineages = []; revealedHints = []; guessesLeft = 25; highestDepthAchieved = 0; gameOver = false; counter.innerText = "Guesses Left: " + guessesLeft; document.querySelectorAll('.winner-name').forEach(el => el.innerText = answer); document.getElementById('victory-screen').style.display = 'none'; document.getElementById('defeat-screen').style.display = 'none'; document.getElementById('floating-replay').style.display = 'none'; hintBtn.classList.remove('disabled'); closePanel(); input.disabled = false; input.value = ''; autocompleteBox.style.display = 'none'; input.focus(); renderTree();}
        function updateUI(c) {
            let i = document.getElementById('card-image-area'); if (c === "???") {document.getElementById('card-title').innerText = "???"; document.getElementById('card-trans').innerText = "Unknown Specimen"; document.getElementById('card-era').innerText = "Unknown"; document.getElementById('card-size').innerText = "Encrypted"; document.getElementById('card-fact').innerText = "Keep guessing to reveal the identity of this dinosaur!"; i.innerHTML = "[ Encrypted Hologram ]";} else {
                let d = cardData[c] || {trans: "Unknown", era: "Unknown", size: "Clade", fact: "Unlocked.", img: ""}; document.getElementById('card-title').innerText = c; document.getElementById('card-trans').innerText = d.trans; document.getElementById('card-era').innerText = d.era || "Unknown"; document.getElementById('card-size').innerText = d.size; document.getElementById('card-fact').innerText = d.fact; let sL = dinoNames.includes(c) ? "Dimensions" : "Information"; document.getElementById('card-size-label').innerText = sL; if (d.img) i.innerHTML = <img src="${d.img}" alt="${c}">; else i.innerHTML = "[ Image Rendering... ]"; } panel.classList.add('active'); arenaWrapper.classList.add('panel-open'); }
        function closePanel() {panel.classList.remove('active'); arenaWrapper.classList.remove('panel-open'); }
        function buildStrictPrunedTree() {let a = guessedLineages.map(g => [...db[g], g]); a.push([...db[answer], answer]); let im = new Set(["Dinosauria", answer, ...guessedLineages, ...revealedHints]); for (let i = 0; i < a.length; {< a.length; {let pA = a[i], pB = a[j], l = pA[0], m = Math.min(pA.length, pB.length); for (let k = 0; k < m; {{name: "Dinosauria", children: [] }; f.forEach(p => {let cu = r; for (let i = 1; i < p.length; {let n = p[i], fo = cu.children.find(ch => ch.name === n); if (!fo) {fo = {name: n, children: []}; cu.children.push(fo); } cu = fo; } }); return r; }
        function generateHTML(n) {let cl = 'node-lcc', d = n.name, cL = n.name; if (n.name === "Dinosauria") cl = 'node-root'; else if (n.name === answer) {cl = gameOver ? 'node-winner' : 'node-mystery'; d = gameOver ? answer : '???'; cL = gameOver ? answer : '???'; } else if (guessedLineages.includes(n.name)) cl = 'node-guess'; let h = <li><div class="node-box ${cl}" onclick="updateUI('${cL}')">${d}</div>; if (n.children && n.children.length > 0) {h += <ul>; n.children.forEach(ch => h += generateHTML(ch)); h += </ul>; } h += </li>; return h; }
        function renderTree() {{treeContainer.innerHTML = <ul><li><div class="node-box node-root" onclick="updateUI('Dinosauria')">Dinosauria</div><ul><li><div class="node-box node-mystery" onclick="updateUI('???')">???</div></li></ul></li></ul>; return; } let t = buildStrictPrunedTree(); treeContainer.innerHTML = <ul>${generateHTML(t)}</ul>; setTimeout(() => {let ar = document.getElementById('arena'); ar.scrollTo({top: ar.scrollHeight, left: (ar.scrollWidth - ar.clientWidth) / 2, behavior: 'smooth' }); }, 100); }
        function processGuess(gS) {let g = gS.charAt(0).toUpperCase() + gS.slice(1).toLowerCase(); if (!db[g]) {showToast("Specimen not found in archive.", "error"); return; } if (guessedLineages.includes(g)) {showToast("Lineage already mapped.", "error"); return; } guessesLeft--; counter.innerText = "Guesses Left: " + guessesLeft; input.value = ''; autocompleteBox.style.display = 'none'; guessedLineages.push(g); let l = "Dinosauria", gL = db[g]; for(let i=0; i<Math.min({{l = gL[i]{gameOver = true; document.getElementById('win-guesses').innerText = guessesLeft; setTimeout(() => document.getElementById('victory-screen').style.display = 'flex', 800); } else {updateUI(l); if (guessesLeft <= 0) {gameOver = true; setTimeout(() => document.getElementById('defeat-screen').style.display = 'flex', 800); } } renderTree(); }
        input.addEventListener('input', function() {let v = this.value.trim().toLowerCase(); autocompleteBox.innerHTML = ''; if (!v) {autocompleteBox.style.display = 'none'; return; } let m = dinoNames.filter(d => d.toLowerCase().includes(v)); if (m.length > 0) {m.forEach(ma => {let it = document.createElement('div'); it.className = 'autocomplete-item'; it.innerText = ma; it.onclick = function () {processGuess(ma);}; autocompleteBox.appendChild(it);}); autocompleteBox.style.display = 'block'; } else {autocompleteBox.style.display = 'none'; } });
        input.addEventListener('keypress', function(e) { if (e.key === 'Enter' && !gameOver && input.value.trim() !== '') processGuess(input.value.trim()); });
        function useHint() {{hintBtn.classList.add('disabled'); showToast("Archive fully decrypted!", "warning"); return; } if (guessesLeft <= 3) {showToast("Insufficient guesses.", "error"); return; } guessesLeft -= 3; counter.innerText = "Guesses Left: " + guessesLeft; highestDepthAchieved++; let nC = answerLin[highestDepthAchieved]; if (!revealedHints.includes(nC) && nC !== answer) revealedHints.push(nC); renderTree(); updateUI(nC); if (highestDepthAchieved >= mD) hintBtn.classList.add('disabled'); }
        function admireTree() {document.getElementById('victory-screen').style.display = 'none'; document.getElementById('defeat-screen').style.display = 'none'; input.disabled = true; hintBtn.classList.add('disabled'); document.getElementById('floating-replay').style.display = 'block'; closePanel(); renderTree(); }
        window.addEventListener('load', initGame);
    </script>
</body>

</html>
