<!doctype html>
<html lang="en" class="page-fixed">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Metajurassic - Clades Archive</title>
        <link rel="icon" href="<%= htmlWebpackPlugin.options.basePath %>/favicon.svg" />
    </head>

    <body>
        <main>
            <div class="archive-container">
                <h1 class="archive-title">Clades Archive</h1>
                <p class="archive-subtitle">
                    Scroll through every clade in the taxonomic tree.
                </p>
                <div class="archive-carousel-wrapper">
                    <button
                        class="carousel-btn carousel-btn-left"
                        id="carousel-left"
                        aria-label="Scroll left"
                    >
                        &#8249;
                    </button>
                    <div class="archive-carousel" id="archive-carousel"></div>
                    <button
                        class="carousel-btn carousel-btn-right"
                        id="carousel-right"
                        aria-label="Scroll right"
                    >
                        &#8250;
                    </button>
                </div>
                <div class="archive-back">
                    <a href="<%= htmlWebpackPlugin.options.basePath %>faq"
                        >Back to FAQ</a
                    >
                </div>
            </div>
        </main>
        <footer>
            <a href="https://github.com/alexjercan/metajurassic" target="_blank"
                >GitHub</a
            >
            <a href="https://metazooa.com" target="_blank"
                >Inspired by Metazooa</a
            >
            <a href="<%= htmlWebpackPlugin.options.basePath %>faq">FAQ</a>
        </footer>
    </body>
</html>
