<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Metajurassic - Species Archive</title>
    </head>

    <body>
        <main>
            <div class="archive-container">
                <h1 class="archive-title">Species Archive</h1>
                <p class="archive-subtitle">
                    Scroll through every species in the museum collection.
                </p>
                <div class="archive-carousel" id="archive-carousel"></div>
                <div class="archive-back">
                    <a href="<%= htmlWebpackPlugin.options.basePath %>faq"
                        >Back to FAQ</a
                    >
                </div>
            </div>
        </main>
        <footer>
            <a href="https://github.com/alexjercan/metajurassic" target="_blank"
                >GitHub</a
            >
            <a href="https://metazooa.com" target="_blank"
                >Inspired by Metazooa</a
            >
            <a href="<%= htmlWebpackPlugin.options.basePath %>faq">FAQ</a>
        </footer>
    </body>
</html>
